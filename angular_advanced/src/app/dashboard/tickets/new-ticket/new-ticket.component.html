<form (ngSubmit)="onSubmit()" #form>
    <app-control label="Title">
        <input name="title" id="title" #input [(ngModel)]="enteredTitle" required/>
    </app-control>
    <app-control label="Request">
        <textarea name="request" id="request" rows="3" #input [(ngModel)]="enteredRequest" required></textarea>
    </app-control>
    <p>
        <button app-button>
            <span>Submit</span>
            <span ngProjectAs="icon">⌲</span>
        </button>
    </p>
</form>
